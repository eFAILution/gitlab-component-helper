spec:
  inputs:
    environment:
      description: Target environment
      type: string
      default: staging
      options:
        - staging
        - production
    region:
      description: Target region (no default)
      type: string
      options:
        - eu-west-1
        - us-east-1
    job_name:
      description: The name of the CI job
      type: string
---
$[[ inputs.job_name ]]:
  script:
    - echo "deploy $[[ inputs.job_name ]] to $[[ inputs.environment ]]/$[[ inputs.region ]]"
