name: PR Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  release-dry-run:
    name: Release Dry Run
    runs-on: ubuntu-latest
    # Skip for fork PRs. Release-it's dry-run inspects commits to preview
    # what would be released — but fork PRs are squash-merged, replacing
    # the contributor's commits with a maintainer-authored one. So the
    # dry-run on the fork's commits has no signal about the eventual
    # release, and `github.head_ref` doesn't resolve to a ref in this repo
    # anyway, which made the checkout fail every time.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}  # Full history for semantic-release

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Release-it Dry Run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Running release-it in dry-run mode to preview what would be released..."
          echo ""
          npx release-it --dry-run --no-git.requireBranch --no-git.push
