name: CI

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node-version: [22.x]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run compile
        run: node esbuild.js

      - name: Run tests
        run: npm run test

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            tests/
            out/
            compile.txt
          retention-days: 30

  extension-host:
    # Runs real providers inside a headless VS Code via @vscode/test-electron.
    # This is the layer that replaces hand-debugging in the Extension Host —
    # hover, completion, validation, activation all exercised end-to-end.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache VS Code test binary
        uses: actions/cache@v4
        with:
          path: .vscode-test
          key: vscode-test-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            vscode-test-${{ runner.os }}-

      - name: Run extension-host tests
        run: xvfb-run -a npm run test:extension-host

      - name: Upload extension-host logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: extension-host-logs
          path: |
            out-test/
            .vscode-test/user-data/logs/
          retention-days: 14

  release:
    needs: [test, extension-host]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release (Beta)
        if: github.ref_name == 'beta'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0
        run: npx release-it --config .release-it.beta.json --ci

      - name: Release (Main)
        if: github.ref_name == 'main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0
        run: npx release-it --config .release-it.json --ci

      - name: Upload .vsix artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: vsix-package-${{ github.ref_name }}
          path: '*.vsix'
          retention-days: 30
