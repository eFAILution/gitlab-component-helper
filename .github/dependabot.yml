# Dependabot version updates.
#
# Security-alert policy (handled OUTSIDE this file): dev-scoped npm vulnerabilities are not gated.
# They are auto-dismissed by a Dependabot auto-triage rule (repo Settings -> Code security ->
# Dependabot -> Auto-triage rules: scope = development -> dismiss), mirroring the dev-group override
# in osv-scanner.toml that the Argus scan honors. Do NOT add a dev-dep `ignore:` here to suppress
# those alerts -- `ignore:` also stops the version-update PRs below, which are how dev tools stay
# current and how a transitive fix (e.g. serialize-javascript >= 7.0.5) actually lands.
version: 2
updates:
  # Maintain npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    assignees:
      - "eFAILution"
    commit-message:
      # prefix has no scope: `include: scope` appends (deps)/(deps-dev). A scoped
      # prefix here would double-scope (e.g. chore(deps)(deps-dev)).
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    # Group development dependencies together
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
    # @types/vscode is pinned to the engines.vscode floor (>=1.120.0): `vsce package`
    # fails when @types/vscode > engines.vscode. Allow only patch bumps (which stay
    # within the floor); a minor/major bump must be a deliberate engines.vscode raise,
    # not an automatic dependency update. This stops the bump, not any security alert.
    # Hold conventional-changelog-conventionalcommits at v9.x. v10 replaced
    # Handlebars template strings with render functions (@conventional-changelog/
    # template) that require conventional-changelog-writer@9. Our release
    # toolchain pins the older Handlebars writer transitively via
    # @release-it/conventional-changelog@11 (conventional-changelog@7 -> writer@8)
    # and expects the conventionalcommits family at ^9.3.1. In the Argus repo,
    # whose release preset IS conventionalcommits, the v10 bump rendered an EMPTY
    # changelog (see huntridge-labs/argus#318). This repo currently uses the
    # angular preset, so it is not directly affected today, but the top-level dep
    # is dev-only and unused by our changelog path, so a major bump has no upside
    # and would become a latent footgun if the preset ever switched. Re-enable
    # once @release-it/conventional-changelog ships the render-function stack
    # (conventional-changelog@8 / writer@9).
    ignore:
      - dependency-name: "@types/vscode"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
      - dependency-name: "conventional-changelog-conventionalcommits"
        update-types:
          - "version-update:semver-major"

  # Maintain GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    assignees:
      - "eFAILution"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "github-actions"

  # Maintain pre-commit hooks
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    assignees:
      - "eFAILution"
    commit-message:
      prefix: "chore(pre-commit)"
    labels:
      - "dependencies"
      - "pre-commit"
